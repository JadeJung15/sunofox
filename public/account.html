<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>SunoFox 계정 설정</title>
  <link rel="icon" href="/assets/sunofox-app-icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/sunofox-app-icon-192.png">
  <link rel="stylesheet" href="/css/sf-auth.css">
</head>
<body class="sf-auth-body sf-auth-account" data-auth-page="account">
  <div class="sf-auth-bg" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
  <main class="sf-auth-shell">
    <section class="sf-auth-stage" aria-labelledby="sf-account-title">
      <span class="sf-auth-ambient-word" aria-hidden="true">PROFILE</span>
      <a class="sf-auth-brand" href="/" aria-label="SunoFox home">
        <img src="/assets/sunofox-logo-mark.png" alt="" class="sf-auth-brand-mark" width="58" height="58" aria-hidden="true">
        <span>SUNOFOX</span>
      </a>
      <div class="sf-auth-copy">
        <span class="sf-auth-kicker">MY ACCOUNT</span>
        <h1 id="sf-account-title" class="sf-auth-title"><span>MEMBER</span><span>PROFILE</span></h1>
        <p>로그인 후 표시 닉네임과 승인 정보를 확인할 수 있습니다.</p>
        <div class="sf-auth-route" aria-label="Profile steps">
          <span>01 LOGIN</span>
          <span>02 NICKNAME</span>
          <span>03 PROFILE</span>
        </div>
      </div>
      <div class="sf-auth-card sf-account-card">
        <div class="sf-auth-card-head">
          <span class="sf-auth-kicker">PROFILE SETTINGS</span>
          <h2>정보 수정</h2>
          <p data-account-email>계정 정보를 불러오는 중입니다.</p>
        </div>
        <div class="sf-linked-login-methods" data-account-providers hidden>
          <span>연결된 로그인</span>
          <div data-account-provider-list></div>
        </div>
        <div class="sf-account-login-state" data-account-login-state hidden>
          <strong>로그인이 필요합니다.</strong>
          <p>로그인 후 수정할 수 있습니다.</p>
          <a href="/login?next=%2Faccount">LOGIN TO EDIT</a>
        </div>
        <form id="sf-account-form" class="sf-auth-form" hidden>
          <label>
            <span>닉네임</span>
            <input id="sf-account-nickname" name="nickname" type="text" autocomplete="nickname" maxlength="24" required placeholder="표시 닉네임">
          </label>
          <button type="submit">SAVE PROFILE</button>
        </form>
        <div id="sf-auth-message" class="sf-auth-message" hidden></div>
        <nav class="sf-auth-links">
          <a href="/">HOME</a>
          <a href="/novels/">NOVEL</a>
          <button type="button" data-auth-logout hidden>LOGOUT</button>
        </nav>
      </div>
    </section>
  </main>
  <script src="/js/sfAuth.js" defer></script>
</body>
</html>
