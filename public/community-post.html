<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f8fafc">
    <title>게시글 | SunoFox 팬 커뮤니티</title>
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://sunofox.com/community-post">
    <link rel="icon" href="./assets/sf-studio-icon-192.png">
    <link rel="stylesheet" href="./css/style.css?v=20260607-fanpage">
    <link rel="stylesheet" href="./css/sf-home.css?v=20260607-fanpage">
    <link rel="stylesheet" href="./css/sf-community.css?v=20260607-d1-community">
  </head>
  <body class="sf-home-body sf-community-body" data-page="community-post">
    <header class="sf-home-header">
      <a class="sf-home-brand" href="/" aria-label="SunoFox 홈">
        <img src="./assets/sunofox-logo-black.png" alt="SunoFox">
        <span>SunoFox</span>
      </a>
      <nav class="sf-home-nav" aria-label="SunoFox 메뉴">
        <a href="/community">팬 커뮤니티</a>
        <a href="/news">새 소식</a>
        <a href="/signup">가입 신청</a>
        <a href="/login">로그인</a>
      </nav>
    </header>

    <main class="sf-community-main sf-post-detail-main">
      <section class="sf-post-detail" aria-live="polite">
        <div id="sf-post-detail-root" class="sf-post-detail-root">
          <p class="sf-community-empty">게시글을 불러오는 중입니다.</p>
        </div>
      </section>

      <section class="sf-comments-panel" aria-labelledby="comments-title">
        <div class="sf-comments-head">
          <div>
            <span class="sf-home-kicker">COMMENTS</span>
            <h2 id="comments-title">댓글</h2>
          </div>
          <a href="/community">목록</a>
        </div>
        <div id="sf-comment-list" class="sf-comment-list">
          <p class="sf-community-empty">댓글을 불러오는 중입니다.</p>
        </div>
        <div id="sf-comment-auth" class="sf-community-auth">
          <p>로그인 상태를 확인하고 있습니다.</p>
        </div>
        <form id="sf-comment-form" class="sf-post-form" hidden>
          <label>
            <span>댓글</span>
            <textarea id="sf-comment-body" rows="4" maxlength="1200" placeholder="댓글을 입력해 주세요."></textarea>
          </label>
          <button type="submit">댓글 등록</button>
        </form>
        <div id="sf-comment-message" class="sf-community-message" hidden></div>
      </section>
    </main>
    <script src="./js/sfCommunityPost.js?v=20260607-d1-community" defer></script>
  </body>
</html>
