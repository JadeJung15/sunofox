<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>SunoFox 로그인</title>
  <link rel="icon" href="/assets/sunofox-mask-icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/sunofox-mask-icon-192.png">
  <link rel="stylesheet" href="/css/sf-auth.v589c28a.css">
</head>
<body class="sf-auth-body" data-auth-page="login">
  <div class="sf-auth-bg" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
  <main class="sf-auth-shell">
    <section class="sf-auth-stage" aria-labelledby="sf-login-title">
      <a class="sf-auth-brand" href="/" aria-label="SunoFox home">
        <img src="/assets/sunofox-mask-icon-192.png" alt="" class="sf-auth-brand-mark" width="58" height="58" aria-hidden="true">
        <span>SUNOFOX</span>
      </a>
      <div class="sf-auth-copy">
        <span class="sf-auth-kicker">PRIVATE ACCESS</span>
        <h1 id="sf-login-title" class="sf-auth-title"><span>MEMBER</span><span>LOGIN</span></h1>
        <p>승인된 계정만 SF Studio와 팬 커뮤니티 작성 기능에 접근할 수 있습니다.</p>
        <div class="sf-auth-route" aria-label="Access steps">
          <span>APPROVED EMAIL</span>
          <span>ENTRY CODE</span>
          <span>STUDIO / COMMUNITY</span>
        </div>
      </div>
      <div class="sf-auth-card">
        <div class="sf-auth-card-head">
          <span class="sf-auth-kicker">ACCESS GATE</span>
          <h2>로그인</h2>
          <p>가입 승인된 이메일과 안내받은 입장 코드를 입력해 주세요.</p>
        </div>
        <form id="sf-login-form" class="sf-auth-form">
          <label>
            <span>이메일</span>
            <input id="sf-login-email" name="email" type="email" autocomplete="email" required placeholder="email@example.com">
          </label>
          <label>
            <span>입장 코드</span>
            <input id="sf-login-code" name="code" type="password" inputmode="numeric" autocomplete="current-password" required placeholder="ENTRY CODE">
          </label>
          <button type="submit">ENTER SITE</button>
        </form>
        <div id="sf-auth-message" class="sf-auth-message" hidden></div>
        <p class="sf-auth-footnote">아직 계정이 없다면 가입 신청 후 사이트 주인 승인을 기다려 주세요.</p>
        <nav class="sf-auth-links">
          <a href="/">HOME</a>
          <a href="/signup">JOIN REQUEST</a>
        </nav>
      </div>
    </section>
  </main>
  <script src="/js/sfAuth.v589c28a.js" defer></script>
</body>
</html>
