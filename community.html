<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f8fafc">
    <title>팬 게시판 | SunoFox</title>
    <meta name="description" content="SunoFox 팬들이 글을 남길 수 있는 게시판입니다.">
    <meta property="og:title" content="팬 게시판 | SunoFox">
    <meta property="og:description" content="SunoFox fan board.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sunofox.com/community">
    <meta property="og:image" content="https://sunofox.com/assets/sf-studio-icon-512.png">
    <link rel="canonical" href="https://sunofox.com/community">
    <link rel="icon" href="./assets/sf-studio-icon-192.png">
    <link rel="stylesheet" href="./css/style.css?v=20260607-fanpage">
    <link rel="stylesheet" href="./css/sf-home.css?v=20260607-fanpage">
    <link rel="stylesheet" href="./css/sf-community.css?v=20260607-community-admin">
  </head>
  <body class="sf-home-body sf-community-body" data-page="community">
    <header class="sf-home-header">
      <a class="sf-home-brand" href="/" aria-label="SunoFox 홈">
        <img src="./assets/sunofox-logo-black.png" alt="SunoFox">
        <span>SunoFox</span>
      </a>
      <nav class="sf-home-nav" aria-label="SunoFox 메뉴">
        <a href="/">홈</a>
        <a href="/community" aria-current="page">팬 게시판</a>
        <a href="/signup">가입 신청</a>
        <a href="/login">로그인</a>
      </nav>
    </header>

    <main class="sf-community-main">
      <section class="sf-community-hero">
        <span class="sf-home-kicker">FAN BOARD</span>
        <h1>팬 게시판</h1>
        <p>승인된 계정으로 로그인한 팬들이 응원글, 작업 아이디어, 감상평을 남길 수 있습니다.</p>
      </section>

      <section class="sf-community-layout">
        <aside class="sf-community-panel" aria-labelledby="write-title">
          <div>
            <span class="sf-home-kicker">WRITE</span>
            <h2 id="write-title">게시글 작성</h2>
          </div>
          <div id="sf-community-auth" class="sf-community-auth">
            <p>로그인 상태를 확인하고 있습니다.</p>
          </div>
          <form id="sf-post-form" class="sf-post-form" hidden>
            <label>
              <span>제목</span>
              <input id="sf-post-title" type="text" maxlength="80" placeholder="팬 게시글 제목">
            </label>
            <label>
              <span>내용</span>
              <textarea id="sf-post-body" rows="8" maxlength="2000" placeholder="응원글, 아이디어, 감상평을 남겨 주세요."></textarea>
            </label>
            <button type="submit">게시글 등록</button>
          </form>
          <div id="sf-community-message" class="sf-community-message" hidden></div>
        </aside>

        <section class="sf-community-feed" aria-labelledby="feed-title">
          <div class="sf-community-feed-head">
            <div>
              <span class="sf-home-kicker">POSTS</span>
              <h2 id="feed-title">팬 게시글</h2>
            </div>
            <button id="sf-post-refresh" type="button">새로고침</button>
          </div>
          <div id="sf-post-list" class="sf-post-list">
            <p class="sf-community-empty">게시글을 불러오는 중입니다.</p>
          </div>
        </section>
      </section>
    </main>
    <script src="./js/sfCommunity.js?v=20260607-community-admin" defer></script>
  </body>
</html>
