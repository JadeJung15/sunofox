<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>SunoFox 로그인</title>
  <link rel="icon" href="./assets/sf-studio-icon-192.png">
  <link rel="stylesheet" href="./css/sf-auth.css">
</head>
<body class="sf-auth-body" data-auth-page="login">
  <main class="sf-auth-shell">
    <section class="sf-auth-card">
      <img src="./assets/sunofox-logo-black.png" alt="sunofox" class="sf-auth-logo">
      <span class="sf-auth-kicker">SUNOFOX</span>
      <h1>SunoFox 로그인</h1>
      <p>승인된 이메일과 입장 코드를 입력하면 팬 게시글 작성과 개인 기능을 이용할 수 있습니다.</p>
      <form id="sf-login-form" class="sf-auth-form">
        <label>
          <span>이메일</span>
          <input id="sf-login-email" name="email" type="email" autocomplete="email" required placeholder="email@example.com">
        </label>
        <label>
          <span>입장 코드</span>
          <input id="sf-login-code" name="code" type="password" inputmode="numeric" autocomplete="current-password" required placeholder="입장 코드">
        </label>
        <button type="submit">로그인</button>
      </form>
      <div id="sf-auth-message" class="sf-auth-message" hidden></div>
      <nav class="sf-auth-links">
        <a href="/">홈</a>
        <a href="/community">팬 게시판</a>
        <a href="/signup">가입 신청</a>
      </nav>
    </section>
  </main>
  <script src="./js/sfAuth.js" defer></script>
</body>
</html>
