<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#050509">
  <title>SunoFox Studio 로그인</title>
  <link rel="icon" href="/assets/sunofox-app-icon-192.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/sf-auth.css">
</head>
<body class="sf-auth-body" data-auth-page="login">
  <main class="sf-auth-shell">
    <a class="sf-auth-brand" href="/" aria-label="SunoFox 홈">SunoFox</a>
    <section class="sf-auth-card" aria-labelledby="login-title">
      <p class="sf-auth-kicker">OWNER WORKSPACE</p>
      <h1 id="login-title">SunoFox Studio</h1>
      <p>등록된 제작자 계정만 입장할 수 있습니다.</p>
      <a class="sf-google-button" href="/api/auth/oauth/start?provider=google&next=/mv-studio" data-oauth-provider="google"><span aria-hidden="true">G</span>Google로 로그인</a>
      <p id="sf-auth-message" class="sf-auth-message" role="status" aria-live="polite" hidden></p>
      <a class="sf-home-link" href="/">공식 사이트로 돌아가기</a>
    </section>
  </main>
  <script src="/js/sfAuth.js" defer></script>
</body>
</html>
